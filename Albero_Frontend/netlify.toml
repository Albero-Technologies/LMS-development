[build]
  command = "npm run build"
  publish = "dist"

# Allow sitemap.xml and robots.txt
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redirect HTTP to HTTPS
[[redirects]]
  from = "http://albero.in/*"
  to = "https://albero.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.albero.in/*"
  to = "https://www.albero.in/:splat"
  status = 301
  force = true

# Redirect non-www to www
[[redirects]]
  from = "https://albero.in/*"
  to = "https://www.albero.in/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
  Content-Security-Policy = """
    default-src 'self';

    script-src 
      'self' 
      'unsafe-inline' 
      'unsafe-eval'
      https://www.googletagmanager.com 
      https://www.google-analytics.com;

    connect-src 
      'self' 
      https://api.anthropic.com 
      https://www.google-analytics.com 
      https://fonts.googleapis.com;

    style-src 
      'self' 
      'unsafe-inline' 
      https://fonts.googleapis.com;

    font-src 
      'self' 
      https://fonts.gstatic.com;

    img-src 
      'self' 
      data: 
      https:;

    frame-src 
      https://www.googletagmanager.com;
  """