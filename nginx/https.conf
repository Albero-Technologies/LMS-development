# -----------------------------------------------------------------------------
# LearnHub — HTTPS edge server block (prod)
# -----------------------------------------------------------------------------
# Terminates TLS on :443, redirects :80 → :443. Fans out:
#   /api/*  → backend Express (learnhub_api upstream on port 3000)
#   /*      → frontend SPA container (web:80, the prod nginx image)
# Assumes certs mounted at /etc/letsencrypt/live/${SERVER_NAME}/ on the host.
# -----------------------------------------------------------------------------

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# In prod the web container listens on :80 (served by nginx:alpine in the
# learnhub-web:prod image). We define a local upstream here so http.conf's
# dev upstream can keep pointing at Vite's 5173 without changes.
upstream learnhub_web_prod {
    server web:80 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

# ----- 80 → 443 redirect ------------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # Let's Encrypt HTTP-01 challenge support.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS reverse proxy ----------------------------------------------------
server {
    listen              443 ssl http2;
    listen              [::]:443 ssl http2;
    server_name         learnhub.in www.learnhub.in api.learnhub.in;

    # Certs — swap domain when deploying to a different host.
    ssl_certificate     /etc/letsencrypt/live/learnhub.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learnhub.in/privkey.pem;

    # Modern TLS only.
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # HSTS — include subdomains; preload after you're confident.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "0"          always;

    # ----------------------------- Backend API ---------------------------------

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ^~ /api/v1/webhooks/ {
        limit_req zone=api_webhooks burst=100 nodelay;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_request_buffering on;
    }

    location ^~ /api/v1/auth/ {
        limit_req zone=api_auth burst=20 nodelay;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
    }

    location ^~ /api/v1/uploads/ {
        client_max_body_size     25m;
        proxy_request_buffering  off;
        proxy_read_timeout       300s;
        proxy_send_timeout       300s;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_global burst=40 nodelay;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    location /uploads/ {
        alias       /var/www/uploads/;
        expires     7d;
        add_header  Cache-Control "public, no-transform";
        access_log  off;
        try_files   $uri =404;
    }

    # ----------------------------- Frontend SPA --------------------------------
    # The SPA container's internal nginx already handles history-API fallback
    # and asset caching. We just forward; no try_files here.

    location / {
        proxy_pass         http://learnhub_web_prod;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
