# Base nginx.conf shared by dev + prod — mounted to /etc/nginx/nginx.conf
# Per-env server blocks live in /etc/nginx/conf.d/default.conf (http.conf / https.conf).

user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                      'urt=$upstream_response_time';
    access_log  /var/log/nginx/access.log  main;

    # --- Core tuning --------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    server_tokens       off;
    types_hash_max_size 2048;

    # --- Upload / proxy body limits ----------------------------------------
    # Matches Express multer cap (10MB) + room for multipart overhead.
    client_max_body_size        15m;
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # --- Timeouts -----------------------------------------------------------
    proxy_connect_timeout       10s;
    proxy_send_timeout          30s;
    proxy_read_timeout          60s;

    # --- Compression --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/xml;

    # --- Rate-limit zones (also enforced in-app via Redis) -----------------
    limit_req_zone  $binary_remote_addr zone=api_global:10m   rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m     rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=api_webhooks:10m rate=50r/s;

    # --- Upstream to the Node API -----------------------------------------
    # `api` is the compose service name; keepalive pool reduces syscall churn.
    upstream learnhub_api {
        server api:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
