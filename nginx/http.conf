# -----------------------------------------------------------------------------
# LearnHub — HTTP edge server block (dev / bootstrap prod)
# -----------------------------------------------------------------------------
# Terminates plain HTTP on :80 and fans out:
#   /api/*  → backend Express (learnhub_api upstream)
#   /*      → frontend SPA / Vite dev (learnhub_web upstream)
# -----------------------------------------------------------------------------

# WebSocket upgrade map — used both by Vite HMR and socket.io (Phase 2+).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

resolver 1.1.1.1 8.8.8.8 ipv6=off valid=60s;

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # Reinforce Helmet headers at the edge.
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "0"          always;

    # Liveness for LB probes — serves without touching the backend.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------
    # Backend API
    # -------------------------------------------------------------------

    # Webhook endpoints — raw body passthrough; higher burst than the rest.
    location ^~ /api/v1/webhooks/ {
        limit_req zone=api_webhooks burst=100 nodelay;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        # Preserve the original body byte-for-byte for HMAC verification.
        proxy_request_buffering on;
    }

    # Auth — stricter per-IP ceiling.
    location ^~ /api/v1/auth/ {
        limit_req zone=api_auth burst=20 nodelay;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
    }

    # File uploads — larger body, longer timeouts, unbuffered to disk.
    location ^~ /api/v1/uploads/ {
        client_max_body_size     25m;
        proxy_request_buffering  off;
        proxy_read_timeout       300s;
        proxy_send_timeout       300s;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Default API reverse-proxy + WebSocket upgrade support.
    location /api/ {
        limit_req zone=api_global burst=40 nodelay;

        proxy_pass         http://learnhub_api;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    # Static uploads served directly by nginx — avoid round-tripping to Node.
    location /uploads/ {
        alias       /var/www/uploads/;
        expires     7d;
        add_header  Cache-Control "public, no-transform";
        access_log  off;
        try_files   $uri =404;
    }

    # Internal forward proxy (egress) — only reachable from private subnets.
    location /_forward/ {
        internal;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        deny  all;

        resolver 1.1.1.1 ipv6=off;
        proxy_pass       $arg_url;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }

    # -------------------------------------------------------------------
    # Frontend SPA / Vite dev server
    # -------------------------------------------------------------------
    # Handles: static assets, PWA files, and the index.html history fallback.
    # In dev the upstream is Vite (port 5173) and WebSocket upgrade carries HMR.
    # In prod the upstream is the SPA nginx container (port 80) — change the
    # `upstream learnhub_web` block in nginx.conf when promoting to prod.

    location / {
        proxy_pass         http://learnhub_web;
        proxy_http_version 1.1;

        # Vite HMR uses WebSockets. This block supports both HMR and regular
        # HTML/asset GETs with the same upstream definition.
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Dev-friendly — let Vite return its own 404s for unknown modules.
        proxy_intercept_errors off;
    }
}
