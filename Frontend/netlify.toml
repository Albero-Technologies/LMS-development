# Netlify deployment config for the Albero Academy frontend.
# Lives inside Frontend/ so the deploy can be configured with that as the
# base directory in Netlify (no monorepo gymnastics needed).

[build]
    command = "npm ci && npm run build"
    publish = "dist/"

[build.environment]
    NODE_VERSION = "20"
    VITE_ENV = "production"
    # Real secrets (VITE_API_BASE_URL, VITE_SENTRY_DSN, etc.) are set in the
    # Netlify dashboard, not here. Anything VITE_* prefixed reaches the browser.

# SPA fallback — React Router owns client-side routing; without this every
# refresh on /app/foo would 404. The same redirect is also written to
# `public/_redirects` so it ends up in `dist/_redirects` after build (Netlify
# reads either; having both makes deployments outside Netlify-managed builds
# work too).
[[redirects]]
    from = "/*"
    to = "/index.html"
    status = 200

# Long cache on hashed asset filenames; HTML always revalidated.
[[headers]]
    for = "/assets/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/index.html"
    [headers.values]
        Cache-Control = "public, max-age=0, must-revalidate"
