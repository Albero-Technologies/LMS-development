# Automated dependency updates. PRs target `dev` so they soak before promotion.
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuring-dependabot-version-updates

version: 2
updates:
  # ---- Backend ----
  - package-ecosystem: npm
    directory: /Backend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    target-branch: dev
    labels: ['dependencies', 'backend']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: scope
    groups:
      prod-patch:
        dependency-type: production
        update-types: [patch]
      dev-minor:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # Pin Prisma/Express majors so we upgrade intentionally.
      - dependency-name: prisma
        update-types: [version-update:semver-major]
      - dependency-name: '@prisma/client'
        update-types: [version-update:semver-major]
      - dependency-name: express
        update-types: [version-update:semver-major]

  # ---- Frontend ----
  - package-ecosystem: npm
    directory: /Frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    target-branch: dev
    labels: ['dependencies', 'frontend']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: scope
    groups:
      prod-patch:
        dependency-type: production
        update-types: [patch]
      dev-minor:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: vite
        update-types: [version-update:semver-major]

  # ---- Docker base images (moved to repo root so both stacks update together) ----
  - package-ecosystem: docker
    directory: /docker/development
    schedule:
      interval: monthly
    labels: ['dependencies', 'docker']
    target-branch: dev
    commit-message:
      prefix: 'chore(docker)'

  - package-ecosystem: docker
    directory: /docker/production
    schedule:
      interval: monthly
    labels: ['dependencies', 'docker']
    target-branch: dev
    commit-message:
      prefix: 'chore(docker)'

  # ---- GitHub Actions ----
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: ['dependencies', 'ci']
    target-branch: dev
    commit-message:
      prefix: 'chore(ci)'
