# Reusable workflow — Frontend quality gate.
# Runs: typecheck (tsc -b) → lint → tests → production build.

name: _frontend-checks

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '20'
      build-mode:
        required: false
        type: string
        default: 'production'
      upload-dist:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  checks:
    name: Frontend — typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint:eslint -- --max-warnings=0

      - name: Prettier format check
        run: npm run format:check

      - name: Tests with coverage
        run: npm run test:coverage -- --run

      - name: Production build
        env:
          # Keep sourcemaps off unless Sentry release upload is configured.
          VITE_BUILD_MODE: ${{ inputs.build-mode }}
        run: npm run build

      - name: Upload dist artifact
        if: ${{ inputs.upload-dist == true }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 7

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: Frontend/coverage
          retention-days: 7
          if-no-files-found: ignore
