# =============================================================================
# LearnHub — DEV PIPELINE (dev branch)
# =============================================================================
# Purpose: fast feedback on feature branches. Tests only — NO build, NO image
# push, NO deploy. Promotion path: dev → PR → uat → PR → main.
#
# Triggers:
#   - push to dev            → lint + typecheck + unit tests
#   - PR targeting dev       → lint + typecheck + unit tests + commit lint
#   - workflow_dispatch      → operator re-run
#
# Free-tier only. Does not touch GHCR, Render, Sentry, or any paid service.
# =============================================================================

name: CI · dev

on:
    push:
        branches: [dev]
    pull_request:
        branches: [dev]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-dev-${{ github.event_name == 'push' && github.sha || github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '20'

jobs:
    # ---------------------------------------------------------------------------
    # 1. Detect what changed so we only run the relevant gate.
    # ---------------------------------------------------------------------------
    changes:
        name: Detect changed paths
        runs-on: ubuntu-latest
        timeout-minutes: 2
        outputs:
            backend: ${{ steps.filter.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      backend:
                        - 'Backend/**'
                        - '.github/workflows/_backend-checks.yml'
                      frontend:
                        - 'Frontend/**'
                        - '.github/workflows/_frontend-checks.yml'

    # ---------------------------------------------------------------------------
    # 2. Conventional Commits for PRs into dev (keep history clean early).
    # ---------------------------------------------------------------------------
    commitlint:
        name: Commitlint
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: Backend/package-lock.json
            - name: Install commitlint deps
              working-directory: Backend
              run: npm ci --include=dev
            - name: Lint PR commit range
              working-directory: Backend
              run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

    # ---------------------------------------------------------------------------
    # 3. Backend — typecheck + lint + unit tests only (NO coverage artifact).
    # ---------------------------------------------------------------------------
    backend:
        name: Backend (tests only)
        needs: changes
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/workflows/_backend-checks.yml
        with:
            node-version: '20'
            run-coverage: false
            upload-coverage: false

    # ---------------------------------------------------------------------------
    # 4. Frontend — lint + tests only (NO production build on dev).
    # ---------------------------------------------------------------------------
    frontend:
        name: Frontend (tests only)
        needs: changes
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/workflows/_frontend-checks.yml
        with:
            node-version: '20'
            build-mode: 'development'
            skip-build: true
            upload-dist: false

    # ---------------------------------------------------------------------------
    # 5. Gate job — single required status check for branch protection.
    # ---------------------------------------------------------------------------
    ci-pass:
        name: CI passed
        if: always()
        runs-on: ubuntu-latest
        needs: [backend, frontend, changes]
        steps:
            - name: Summarise outcomes
              env:
                  RESULTS: ${{ toJson(needs) }}
              run: |
                  echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
                  fail=$(echo "$RESULTS" | jq -r '[.[] | select(.result == "failure" or .result == "cancelled" or .result == "timed_out")] | length')
                  if [ "$fail" -gt 0 ]; then
                    echo "::error::one or more required jobs failed"
                    exit 1
                  fi
                  echo "✓ all required jobs passed or skipped"
