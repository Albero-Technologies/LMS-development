# =============================================================================
# LearnHub — PRODUCTION PIPELINE (main branch)
# =============================================================================
# Triggers:
#   - push to main            → full gate → build image → scan → deploy (manual)
#   - PR targeting main       → full gate only (no image push, no deploy)
#   - workflow_dispatch       → operator re-run
#
# Promotion model:
#   dev  → PR → uat  (ci-uat.yml)   → soak in UAT
#   uat  → PR → main (this workflow) → production release
#
# Required repository / environment secrets:
#   - GHCR push uses GITHUB_TOKEN (no setup).
#   - DEPLOY_PROD_*  (set under the "production" GitHub Environment):
#       RENDER_DEPLOY_HOOK   — Render webhook URL
#       RENDER_API_KEY       — (optional) for fetching deploy status
#       DATABASE_URL_PROD    — prisma migrate deploy target
#       SENTRY_AUTH_TOKEN    — (optional) for release tagging
#
# Branch protection (configure in repo settings):
#   main: require this workflow to pass + 1 review + no direct pushes
# =============================================================================

name: CI · main (production)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

concurrency:
  # On push to main, never cancel a running deploy. On PRs, cancel stale runs.
  group: ci-main-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Metadata: resolve what changed, what needs to run.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker:   ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Backend/**'
              - '.github/workflows/_backend-checks.yml'
            frontend:
              - 'Frontend/**'
              - '.github/workflows/_frontend-checks.yml'
            docker:
              - 'Backend/docker/**'
              - 'Backend/Dockerfile*'
              - 'Backend/package*.json'
              - 'Backend/prisma/**'
              - 'Backend/src/**'
            workflows:
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # 2. Commit-message lint (blocks PRs that don't match Conventional Commits).
  # ---------------------------------------------------------------------------
  commitlint:
    name: Commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - name: Install deps
        run: npm ci --include=dev
      - name: Lint PR commit range
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

  # ---------------------------------------------------------------------------
  # 3. Secret scan (gitleaks) — catch anything husky missed on untrusted PRs.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Backend quality gate — reusable workflow
  # ---------------------------------------------------------------------------
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_backend-checks.yml
    with:
      node-version: '20'
      run-coverage: true
      upload-coverage: true

  # ---------------------------------------------------------------------------
  # 5. Frontend quality gate — reusable workflow
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_frontend-checks.yml
    with:
      node-version: '20'
      build-mode: 'production'
      upload-dist: true

  # ---------------------------------------------------------------------------
  # 6. Dependency audit — fails on HIGH+ vulnerabilities in prod deps.
  # ---------------------------------------------------------------------------
  audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    strategy:
      fail-fast: false
      matrix:
        workspace: [Backend, Frontend]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high

  # ---------------------------------------------------------------------------
  # 7. Build + push Docker image to GHCR — only on push to main.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image
    needs: [backend, audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_docker-build.yml
    with:
      environment: production
      push: true
      dockerfile: Backend/docker/production/Dockerfile
      context: Backend
      image-name: backend

  # ---------------------------------------------------------------------------
  # 8. Prisma migration dry-run — guards against risky schema changes.
  # ---------------------------------------------------------------------------
  migration-dry-run:
    name: Prisma migrate (dry-run vs. staging DB)
    needs: backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - run: npm ci --include=dev
      - run: npx prisma generate
      - name: Validate schema + migrations
        run: |
          npx prisma validate
          npx prisma migrate diff \
            --from-schema-datamodel prisma/schema.prisma \
            --to-schema-datamodel prisma/schema.prisma \
            --script > /tmp/migrate-diff.sql || true
          echo "::group::Pending migrations"
          ls prisma/migrations 2>/dev/null || echo "(none)"
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # 9. Deploy to production — gated by the "production" Environment
  #    (set required reviewers under repo → Environments → production).
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy → production
    needs: [docker, migration-dry-run]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.learnhub.in
    timeout-minutes: 30
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Echo image reference
        run: echo "Deploying ${{ needs.docker.outputs.image }} (${{ needs.docker.outputs.digest }})"

      - name: Apply Prisma migrations
        working-directory: Backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL_PROD not set; skipping migrate deploy"
            exit 0
          fi
          npm ci --include=dev
          npx prisma migrate deploy

      - name: Trigger Render deploy
        if: ${{ env.RENDER_HOOK != '' }}
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$RENDER_HOOK" \
            -H 'Content-Type: application/json' \
            -d '{"imageUrl":"${{ needs.docker.outputs.image }}","sha":"${{ github.sha }}"}' | tee /tmp/deploy.json

      - name: Smoke test production
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 https://api.learnhub.in/api/v1/health >/dev/null; then
              echo "✓ production healthy"
              exit 0
            fi
            echo "waiting for production to come up… ($i/6)"
            sleep 20
          done
          echo "::error::production /health did not return 200 in time"
          exit 1

      - name: Create Sentry release
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: learnhub
          SENTRY_PROJECT: backend
        with:
          environment: production
          version: ${{ github.sha }}

  # ---------------------------------------------------------------------------
  # 10. Gate job — single required status check for branch protection.
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI passed
    if: always()
    runs-on: ubuntu-latest
    needs: [backend, frontend, audit, secret-scan, changes]
    steps:
      - name: Summarise outcomes
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          fail=$(echo "$RESULTS" | jq -r '[.[] | select(.result == "failure" or .result == "cancelled" or .result == "timed_out")] | length')
          if [ "$fail" -gt 0 ]; then
            echo "::error::one or more required jobs failed"
            exit 1
          fi
          echo "✓ all required jobs passed or skipped"
