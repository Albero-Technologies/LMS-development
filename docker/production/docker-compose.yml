# -----------------------------------------------------------------------------
# LearnHub — PRODUCTION-LIKE compose (staging / self-hosted VPS).
# Run from the repo root:
#
#   docker compose -f docker/production/docker-compose.yml --env-file .env up -d --build
#
# Images produced:
#   learnhub-api:prod — backend Express + prisma, built from Backend/
#   learnhub-web:prod — frontend SPA served by tiny nginx, built from Frontend/
#
# Edge nginx terminates HTTPS and fans out:
#     /api/*  → api:3000
#     /*      → web:80   (the SPA container)
#
# On managed platforms (Render/ECS) the edge layer is typically the platform's
# own load balancer — in that case skip the `nginx` service and expose api + web
# directly.
# -----------------------------------------------------------------------------

name: learnhub

services:
    api:
        build:
            context: ../../Backend
            dockerfile: ../docker/production/Dockerfile.backend
        image: learnhub-api:prod
        restart: unless-stopped
        env_file: ../../Backend/.env.production
        environment:
            ENV: production
            PORT: 3000
        expose:
            - '3000'

    worker:
        image: learnhub-api:prod
        command: ['node', 'dist/worker.js']
        restart: unless-stopped
        env_file: ../../Backend/.env.production
        environment:
            ENV: production
        depends_on:
            - api

    web:
        build:
            context: ../../Frontend
            dockerfile: ../docker/production/Dockerfile.frontend
            args:
                VITE_ENV: production
                PORT: '5173'
                BACKEND_PROXY: https://api.learnhub.in
                SENTRY_TOKEN: ''
        image: learnhub-web:prod
        restart: unless-stopped
        expose:
            - '80'

    nginx:
        image: nginx:1.27-alpine
        restart: unless-stopped
        depends_on:
            - api
            - web
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ../../nginx/https.conf:/etc/nginx/conf.d/default.conf:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
