# Loki — single-binary mode for local dev. Stores chunks on the container
# filesystem (volume-mounted). Good for low-throughput dev + UAT. In prod,
# swap the filesystem store for S3 + a real schema definition.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h          # 7 days; bump on bigger disks
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  max_query_series: 5000
  max_query_lookback: 168h

ruler:
  alertmanager_url: http://localhost:9093
