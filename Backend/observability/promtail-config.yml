# Promtail — tails logs from every Docker container on the host and ships
# them to Loki. JSON lines (as our winston logger emits) are auto-parsed.
#
# Access to /var/run/docker.sock is required; it's mounted read-only in
# docker-compose.yml.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # -------------------------------------------------------------------------
  # Docker container logs — service discovery via the Docker socket.
  # -------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s

    relabel_configs:
      # Extract the container / service / compose project as labels.
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

    pipeline_stages:
      # If the line is JSON (our winston output), hoist useful fields into labels.
      - match:
          selector: '{service=~"api|worker"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: message
                  requestId: meta.requestId
                  tenantId: meta.tenantId
                  route: meta.path
            - labels:
                level:
                requestId:
                tenantId:
            - timestamp:
                source: timestamp
                format: RFC3339Nano
                action_on_failure: skip

  # -------------------------------------------------------------------------
  # Winston file tail (backup path when Docker socket isn't reachable).
  # Expects /var/log/learnhub mounted from the API container's logs/ dir.
  # -------------------------------------------------------------------------
  - job_name: winston-files
    static_configs:
      - targets: [localhost]
        labels:
          job: winston
          service: learnhub-api-file
          __path__: /var/log/learnhub/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            msg: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          action_on_failure: skip
