# Render deployment config for the Albero Academy backend.
# Lives inside Backend/ so the Render service can be configured with that as
# the root directory.
#
# Free-tier keepalive — see Backend/KEEPALIVE.md for details:
#   - Deployed URL:  https://lms-development.onrender.com
#   - Health probe:  GET /api/v1/health
#   - Pinger:        cron-job.org "Albero API keepalive" (every ~10 min)
# The web service spins down after ~15 min of inactivity, so the external
# pinger above keeps it warm 24/7. Render's native Cron service is paid;
# cron-job.org is free and purpose-built for this.

services:
    - type: web
      name: albero-api
      runtime: node
      plan: free
      buildCommand: npm ci --include=dev && npx prisma generate && npm run build
      startCommand: npm start
      healthCheckPath: /api/v1/health
      autoDeploy: true
      envVars:
          - key: NODE_VERSION
            value: '20'
          - key: NODE_ENV
            value: production
          - key: ENV
            value: production
          - key: PORT
            value: '10000' # Render injects this; declared so the build doesn't trip
          # Every secret below must be set in the Render dashboard before the
          # service boots. Listed here as documentation only.
          # - DATABASE_URL          (Neon connection string)
          # - REDIS_URL             (Upstash rediss:// URL)
          # - JWT_ACCESS_SECRET
          # - JWT_REFRESH_SECRET
          # - SERVER_URL            (https://<service>.onrender.com)
          # - CORS_ORIGIN           (https://<frontend>.netlify.app)
          # - ALLOWED_TENANT_ORIGINS
          # - COOKIE_DOMAIN         (.<your-domain>)
          # - COOKIE_SECURE=true
          # - NODEMAILER_MAIL / NODEMAILER_PASS
          # - RAZORPAY_KEY_ID / RAZORPAY_KEY_SECRET / RAZORPAY_WEBHOOK_SECRET
          # - SUPERADMIN_EMAIL / SUPERADMIN_PASSWORD
